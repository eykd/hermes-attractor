repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix]
        exclude: ^\.claude/
      - id: ruff-format
        exclude: ^\.claude/

  - repo: local
    hooks:
      - id: pyright
        name: pyright (strict)
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest (100% coverage)
        entry: uv run pytest --cov=src/hermes_attractor --cov-fail-under=100
        language: system
        pass_filenames: false
        always_run: true
