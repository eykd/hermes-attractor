# Hermes plugin manifest for `attractor`.
#
# Tool registration API (register_tool, schema format with "parameters" key,
# positional toolset arg, handler kwargs tolerance) is VERIFIED against
# hermes-agent 0.15.2.  Hook and CLI-command registration are deferred to Part B.
#
# Discovery for local dev uses the `.hermes/plugins/attractor` symlink; the
# pip entry point (`hermes_agent.plugins` group) is the distribution path.
name: attractor
version: 0.1.0
description: >
  A Hermes Agent plugin that provides LLM-driven authoring and execution of
  attractor pipelines, built on a hexagonal core.
author: eykd
kind: standalone
entry_point: hermes_attractor.plugin:register
provides_tools:
  - health
  - echo
  - attractor_create_graph
  - attractor_add_node
  - attractor_remove_node
  - attractor_add_edge
  - attractor_remove_edge
  - attractor_set_stylesheet
  - attractor_validate
  - attractor_summary
  - attractor_run
  - attractor_status
  - attractor_result
requires_env: []
