# Hermes plugin manifest for `attractor`.
#
# Tool, hook, and CLI-command registration APIs (register_tool with "parameters"
# schema + positional toolset arg + handler kwargs tolerance; register_hook;
# register_cli_command) are VERIFIED against hermes-agent 0.15.2 via the integration
# suite that calls register() on a real PluginContext.
#
# NOTE: this manifest's schema/fields are NOT yet validated against Hermes's actual
# plugin loader — discovery (pip entry point `hermes_agent.plugins`, or the
# `.hermes/plugins/attractor` symlink for local dev) has not been run in a live session.
name: attractor
version: 0.1.0
description: >
  A Hermes Agent plugin that provides LLM-driven authoring and execution of
  attractor pipelines, built on a hexagonal core.
author: eykd
kind: standalone
entry_point: hermes_attractor.plugin:register
provides_tools:
  - health
  - echo
  - attractor_create_graph
  - attractor_add_node
  - attractor_remove_node
  - attractor_add_edge
  - attractor_remove_edge
  - attractor_set_stylesheet
  - attractor_validate
  - attractor_summary
  - attractor_run
  - attractor_status
  - attractor_result
requires_env: []
